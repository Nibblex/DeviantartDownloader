name: Publish

# Publishing to PyPI is irreversible: a version number can never be reused.
# So the release is only built and uploaded once the tag has been checked
# against the packaged version and the suite has passed.
on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - name: Install
        run: python -m pip install -e .[dev]
      # The full 3.10-3.14 matrix already ran on main (ci.yml); this is here
      # in case a release is cut from a tag that never went through it.
      - name: Test
        run: pytest --no-cov

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - name: Check the tag matches the packaged version
        run: |
          version=$(python -c "import tomllib, pathlib; print(tomllib.loads(pathlib.Path('pyproject.toml').read_text())['project']['version'])")
          tag="${GITHUB_REF_NAME#v}"
          if [ "$version" != "$tag" ]; then
            echo "::error::tag $GITHUB_REF_NAME does not match the version in pyproject.toml ($version)"
            exit 1
          fi
          echo "Publishing version $version"
      - name: Build
        run: |
          python -m pip install build twine
          python -m build
          python -m twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    # Must match the environment configured on the PyPI trusted publisher.
    environment:
      name: pypi
      url: https://pypi.org/project/deviantart-gallery-downloader/
    permissions:
      id-token: write   # the only credential involved: a short-lived OIDC token
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
